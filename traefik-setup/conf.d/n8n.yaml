# ==============================================
# n8n Dynamic Configuration
# Location: /etc/traefik/conf.d/n8n.yaml
#
# Shared middlewares are in _shared.yaml
# Default Web UI port: 5678
#
# Webhook paths (/webhook/*) are externally
# accessible for third-party integrations.
# Test webhooks (/webhook-test/*) are blocked
# from external access for safety.
# ==============================================

http:
  routers:
    # -- Main n8n Router (UI + API) --
    n8n:
      rule: "Host(`n8n.starklab.mkroshana.com`) || Host(`automations.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: n8n-svc
      middlewares:
        - crowdsec-bouncer
        - security-headers
        - general-rate-limit
      tls:
        certResolver: cloudflare

    # -- Strict rate limit on n8n auth endpoint --
    n8n-auth:
      rule: "(Host(`n8n.starklab.mkroshana.com`) || Host(`automations.starklab.mkroshana.com`)) && PathPrefix(`/rest/login`)"
      entryPoints:
        - websecure
      service: n8n-svc
      middlewares:
        - crowdsec-bouncer
        - security-headers
        - auth-rate-limit
      tls:
        certResolver: cloudflare
      priority: 50

    # -- Block test webhooks from external access --
    n8n-block-test-webhooks:
      rule: "(Host(`n8n.starklab.mkroshana.com`) || Host(`automations.starklab.mkroshana.com`)) && PathPrefix(`/webhook-test`)"
      entryPoints:
        - websecure
      service: n8n-svc
      middlewares:
        - block-external
        - security-headers
      tls:
        certResolver: cloudflare
      priority: 80

  services:
    n8n-svc:
      loadBalancer:
        servers:
          - url: "http://10.10.10.201:5678"
        passHostHeader: true
