# ==============================================
# Plex Dynamic Configuration
# Location: /etc/traefik/conf.d/plex.yaml
#
# Post-deploy: Configure Plex settings:
#   1. Settings → Network → Custom server access URLs:
#      https://plex.starklab.mkroshana.com:443
#   2. Settings → Network → Secure connections: Preferred
#   3. Settings → Remote Access → DISABLE remote access
#      (Traefik handles external routing now)
# ==============================================

http:
  routers:
    # -- Main Plex Router --
    plex:
      rule: "Host(`plex.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: plex-svc
      middlewares:
        - crowdsec-bouncer
        - cloudflare-only
        - security-headers
        - general-rate-limit
      tls:
        certResolver: cloudflare

    # -- Strict rate limit on Plex auth endpoint --
    plex-auth:
      rule: "Host(`plex.starklab.mkroshana.com`) && PathPrefix(`/users/sign_in`)"
      entryPoints:
        - websecure
      service: plex-svc
      middlewares:
        - crowdsec-bouncer
        - cloudflare-only
        - security-headers
        - auth-rate-limit
      tls:
        certResolver: cloudflare
      priority: 50

  services:
    plex-svc:
      loadBalancer:
        servers:
          - url: "http://10.10.10.120:32400"
        passHostHeader: true
