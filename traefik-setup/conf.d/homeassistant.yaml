# ==============================================
# Home Assistant Dynamic Configuration
# Location: /etc/traefik/conf.d/homeassistant.yaml
#
# Post-deploy: Add to HA's configuration.yaml:
#   http:
#     use_x_forwarded_for: true
#     trusted_proxies:
#       - 10.10.10.101  # Traefik LXC IP
#
# Then restart Home Assistant.
# WebSocket is handled natively by Traefik v3.
# ==============================================

http:
  routers:
    # -- Main Home Assistant Router --
    homeassistant:
      rule: "Host(`ha.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: homeassistant-svc
      middlewares:
        - crowdsec-bouncer
        - security-headers
        - general-rate-limit
      tls:
        certResolver: cloudflare
      priority: 1

    # -- Strict rate limit on HA auth endpoint --
    homeassistant-auth:
      rule: "Host(`ha.starklab.mkroshana.com`) && PathPrefix(`/auth`)"
      entryPoints:
        - websecure
      service: homeassistant-svc
      middlewares:
        - crowdsec-bouncer
        - security-headers
        - auth-rate-limit
      tls:
        certResolver: cloudflare
      priority: 50

  services:
    homeassistant-svc:
      loadBalancer:
        servers:
          - url: "http://10.10.10.154:8123"
        passHostHeader: true
