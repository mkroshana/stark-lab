# ==============================================
# Radarr Dynamic Configuration
# Location: /etc/traefik/conf.d/radarr.yaml
#
# Shared middlewares are in _shared.yaml
# Default Web UI port: 7878
# ==============================================

http:
  routers:
    # -- Main Radarr Router --
    radarr:
      rule: "Host(`radarr.starklab.mkroshana.com`) || Host(`movies.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: radarr-svc
      middlewares:
        - crowdsec-bouncer
        - security-headers
        - general-rate-limit
      tls:
        certResolver: cloudflare

    # -- Strict rate limit on Radarr auth endpoint --
    radarr-auth:
      rule: "(Host(`radarr.starklab.mkroshana.com`) || Host(`movies.starklab.mkroshana.com`)) && PathPrefix(`/login`)"
      entryPoints:
        - websecure
      service: radarr-svc
      middlewares:
        - crowdsec-bouncer
        - security-headers
        - auth-rate-limit
      tls:
        certResolver: cloudflare
      priority: 50

  services:
    radarr-svc:
      loadBalancer:
        servers:
          - url: "http://10.10.10.117:7878"
        passHostHeader: true
