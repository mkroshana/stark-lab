# ==============================================
# Traefik Dashboard (Secured)
# Location: /etc/traefik/conf.d/dashboard.yaml
#
# Post-deploy:
#   1. Generate password hash:
#      sudo apt install apache2-utils
#      htpasswd -nb admin YOUR_PASSWORD
#   2. Replace the hash below with the output
#   3. Escape all $ signs by doubling them: $ → $$
#      Example: admin:$$apr1$$xyz$$hash → the $$ is needed in YAML
# ==============================================

http:
  routers:
    dashboard:
      rule: "Host(`traefik.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - block-external
        - dashboard-auth
        - security-headers
      tls:
        certResolver: cloudflare

  middlewares:
    dashboard-auth:
      basicAuth:
        users:
          # Injected by deploy.sh from .env ($ signs are escaped automatically)
          - ${DASHBOARD_AUTH_HASH}
