# ==============================================
# Traefik Dashboard Configuration
#
# Exposes the internal Traefik API/Dashboard
# protected by Basic Auth and blocked to LAN.
# ==============================================

http:
  routers:
    # --- Traefik Dashboard Router ---
    traefik-dashboard:
      rule: "Host(`traefik.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-auth
      tls:
        certResolver: letsencrypt # or cloudflare

  # -- Middlewares --
  middlewares:
    # Basic Auth for Dashboard
    dashboard-auth:
      basicAuth:
        users:
          - 'traefiktest:$$apr1$$XQZ.P7Z.$6JzXmOn5jYn85rYFzU6pC1'
          - '${DASHBOARD_AUTH_HASH}'
