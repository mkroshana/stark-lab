# ==============================================
# Traefik Dashboard Configuration
# ==============================================

http:
  routers:
    # --- Traefik Dashboard Router ---
    traefik-dashboard:
      rule: "Host(`traefik.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-auth
      tls:
        certResolver: cloudflare

  # -- Middlewares --
  middlewares:
    # Basic Auth for Dashboard
    dashboard-auth:
      basicAuth:
        users:
          - "${DASH_AUTH_YAML_READY}"
