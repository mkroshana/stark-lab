# ==============================================
# Shared Middlewares
# Location: /etc/traefik/conf.d/_shared.yaml
#
# These middlewares are available to ALL service
# configs in this directory. To add a new service,
# just reference these middleware names in your
# router's middlewares list.
# ==============================================

http:
  middlewares:
    # -- CrowdSec Bouncer (community threat intelligence) --
    crowdsec-bouncer:
      plugin:
        crowdsec:
          enabled: true
          crowdsecLapiScheme: http
          crowdsecLapiHost: "127.0.0.1:6060"
          # Injected by deploy.sh from .env
          crowdsecLapiKey: "${CROWDSEC_BOUNCER_API_KEY}"

    # -- General Rate Limit (100 req/min, burst 200) --
    general-rate-limit:
      rateLimit:
        average: 100
        period: "1m"
        burst: 200

    # -- Auth Rate Limit (5 req/min, burst 3) --
    auth-rate-limit:
      rateLimit:
        average: 5
        period: "1m"
        burst: 3

    # -- Security Headers --
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
          X-Permitted-Cross-Domain-Policies: "none"

    # -- Block External Access (allows only LAN) --
    block-external:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"
          - "10.10.10.0/24"
          - "192.168.0.0/16"
          - "112.135.0.0/16" # Your Home Public IP Range (hairpin NAT)

    # -- Cloudflare IP Whitelist --
    cloudflare-only:
      ipAllowList:
        sourceRange:
          # IPv4 Ranges
          - "173.245.48.0/20"
          - "103.21.244.0/22"
          - "103.22.200.0/22"
          - "103.31.4.0/22"
          - "141.101.64.0/18"
          - "108.162.192.0/18"
          - "190.93.240.0/20"
          - "188.114.96.0/20"
          - "197.234.240.0/22"
          - "198.41.128.0/17"
          - "162.158.0.0/15"
          - "104.16.0.0/13"
          - "104.24.0.0/14"
          - "172.64.0.0/13"
          - "131.0.72.0/22"
          # IPv6 Ranges
          - "2400:cb00::/32"
          - "2606:4700::/32"
          - "2803:f800::/32"
          - "2405:b500::/32"
          - "2405:8100::/32"
          - "2a06:98c0::/29"
          - "2c0f:f248::/32"
          # Local Networks
          - "127.0.0.1/32"
          - "10.0.0.0/8"
          - "192.168.0.0/16"
          - "172.16.0.0/12"
