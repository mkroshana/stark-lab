# ==============================================
# Seer Dynamic Configuration
# Location: /etc/traefik/conf.d/seer.yaml
#
# Shared middlewares are in _shared.yaml
# Default port: 5055
# ==============================================

http:
  routers:
    # -- Main Seer Router --
    seer:
      rule: "Host(`seer.starklab.mkroshana.com`) || Host(`request.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: seer-svc
      middlewares:
        - crowdsec-bouncer
        - security-headers
        - general-rate-limit
      tls:
        certResolver: cloudflare
    # -- Strict rate limit on Seer auth endpoint --
    seer-auth:
      rule: "(Host(`seer.starklab.mkroshana.com`) || Host(`request.starklab.mkroshana.com`)) && PathPrefix(`/login`)"
      entryPoints:
        - websecure
      service: seer-svc
      middlewares:
        - crowdsec-bouncer
        - security-headers
        - auth-rate-limit
      tls:
        certResolver: cloudflare
      priority: 50


  services:
    seer-svc:
      loadBalancer:
        servers:
          - url: "http://10.10.10.119:5055"
        passHostHeader: true
