http:
  routers:
    local-n8n:
      rule: "Host(`n8n.local.starklab.mkroshana.com`) || Host(`automations.local.starklab.mkroshana.com`)"
      entryPoints:
        - websecure
      service: n8n-svc
      middlewares:
        - local-only
      tls:
        certResolver: cloudflare

  services:
    n8n-svc:
      loadBalancer:
        servers:
          - url: "http://10.10.10.201:5678"
        passHostHeader: true
