# ==============================================
# Traefik v3 Static Configuration (Native Install)
# For: jellyfin.mkroshana.com → 10.10.10.121:8096
# Location: /etc/traefik/traefik.yaml
# ==============================================

# -- Providers --
providers:
  file:
    directory: /etc/traefik/conf.d/
    watch: true

# -- Entry Points --
entryPoints:
  # HTTP → HTTPS redirect (port 80)
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  # HTTPS (port 443)
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: cloudflare
        domains:
          - main: "starklab.mkroshana.com"
            sans:
              - "*.starklab.mkroshana.com"
              - "*.local.starklab.mkroshana.com"
  # Dashboard — internal LAN access only (NOT port-forwarded)
  traefik:
    address: ":8080"

# -- Certificate Resolvers (Let's Encrypt via Cloudflare DNS-01) --
# NO PORT 80 NEEDED — uses Cloudflare API for domain verification
certificatesResolvers:
  cloudflare:
    acme:
      # Injected by deploy.sh from .env
      email: ${ACME_EMAIL}
      storage: /etc/traefik/ssl/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
        propagation:
          delayBeforeChecks: "10s"

# -- API / Dashboard --
api:
  dashboard: true
  insecure: false

# -- Logging --
log:
  filePath: /var/log/traefik/traefik.log
  format: json
  level: WARN

# -- Access Log (REQUIRED for CrowdSec) --
accessLog:
  filePath: /var/log/traefik/traefik-access.log
  format: json
  bufferingSize: 0
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep
        X-Real-Ip: keep

# -- CrowdSec Bouncer Plugin --
experimental:
  plugins:
    crowdsec:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.3.5"
